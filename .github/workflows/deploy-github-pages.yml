# GitHub 저장소 → Settings → Pages → Build: GitHub Actions 로 선택해야 합니다.
#
# 기본 주소: https://jjungnii.github.io/jjungnii-lab/
# 커스텀 도메인을 Pages에 연결했다면 아래 두 곳의 VITE_BASE_PATH 를 "/" 로 바꾼 뒤 다시 배포하세요.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: SPA fallback (client-side routes on Pages)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
